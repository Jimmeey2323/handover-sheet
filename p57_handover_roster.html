<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>57 Physique | New Client Handover</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a; /* Dark Navy */
            --secondary: #64748b; /* Slate Grey */
            --border: #e2e8f0; 
            --border-active: #0f172a;
            --bg: #ffffff;
            --bg-hover: #f8fafc;
            --radius: 2px; /* Sharper, professional radius */
            --font-main: 'Inter', sans-serif;
            --font-head: 'Montserrat', sans-serif;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            font-family: var(--font-main);
            background-color: #f1f5f9;
            color: var(--primary);
            padding: 2rem 1rem;
            line-height: 1.4;
        }

        .root {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--bg);
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        /* --- Header --- */
        .hdr {
            padding: 1.5rem 2rem;
            border-bottom: 2px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand img {
            height: 48px;
            width: auto;
        }

        .brand-text h1 {
            font-family: var(--font-head);
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }
        .brand-text span {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hdr-meta {
            display: flex;
            gap: 2rem;
            align-items: flex-end;
        }

        .hdr-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 160px;
        }

        .hdr-field label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .label-icon {
            font-size: 0.95rem;
            line-height: 1;
        }

        .hdr-field select, .hdr-field input {
            font-family: var(--font-main);
            font-size: 0.9rem;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: #fff;
            color: var(--primary);
            width: 100%;
            font-weight: 500;
        }

        .doc-title {
            text-align: right;
            border-left: 1px solid var(--border);
            padding-left: 2rem;
        }
        .doc-title h2 {
            font-family: var(--font-head);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .doc-title p {
            font-size: 0.7rem;
            color: var(--secondary);
            text-transform: uppercase;
        }

        /* --- Toolbar --- */
        .toolbar {
            padding: 0.75rem 2rem;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .btn-add {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-add:hover { background: #334155; }

        .btn-icon {
            font-size: 0.95rem;
            line-height: 1;
        }

        /* --- Table --- */
        .table-wrap {
            overflow-x: auto;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            padding: 0.75rem 1rem 1rem;
        }
        
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.85rem;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
        }
        
        thead {
            background: #f1f5f9;
        }
        
        th {
            padding: 12px 14px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--secondary);
            text-align: left;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
            background: #f8fafc;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            vertical-align: top;
            background: #fff;
        }
        td:last-child { border-right: none; }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:nth-child(even) td {
            background: #fcfdff;
        }

        tbody tr:hover td {
            background: #f8fbff;
        }
        
        /* --- Inputs & Buttons --- */
        
        /* Text Inputs */
        td input[type="text"], .custom-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 10px;
            font-family: var(--font-main);
            font-size: 0.8rem;
            transition: border 0.2s;
            margin-top: 8px;
            display: block;
            background: #fff;
        }
        td select,
        td textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 10px;
            font-family: var(--font-main);
            font-size: 0.8rem;
            transition: border 0.2s;
            background: #fff;
            color: var(--primary);
            line-height: 1.25;
            text-overflow: clip;
        }
        td input[type="text"]:focus, .custom-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.08);
        }
        td select:focus,
        td textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.08);
        }
        td input.name-input {
            font-weight: 600;
            font-size: 0.95rem;
            padding: 8px 12px;
            background: #fcfcfc;
        }

        .client-details {
            display: grid;
            gap: 8px;
        }

        .client-meta {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .client-meta-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .client-meta-field label {
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--secondary);
        }

        /* Tag Grid Container */
        .tag-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
            gap: 5px;
        }

        /* The Premium Buttons */
        .tag-btn {
            font-size: 0.68rem;
            padding: 6px 5px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            background: #fff;
            color: var(--secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-main);
            font-weight: 500;
            text-align: center;
            line-height: 1.3;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tag-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #f8fafc;
        }

        .tag-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        
        .tag-btn.custom-btn {
            border-style: dashed;
            font-weight: 600;
            color: var(--primary);
            min-width: 70px;
            background: #f8fafc;
        }
        .tag-btn.custom-btn:hover {
            background: #f1f5f9;
        }

        .field-sections {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-section {
            padding: 8px;
            border: 1px solid var(--border);
            background: #f8fafc;
            border-radius: 6px;
        }

        .field-section-title {
            display: block;
            margin-bottom: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--secondary);
        }

        /* Specific Layout Adjustments */
        .col-med { min-width: 220px; }
        .col-inj { min-width: 190px; }
        .col-goals { min-width: 190px; }
        .col-prev { min-width: 170px; }
        .col-level { min-width: 100px; }
        .col-flags { min-width: 190px; }
        .col-notes { min-width: 220px; }
        .col-trainer-assessment { min-width: 620px; }
        .col-del { width: 48px; text-align: center; padding: 12px 0 !important; }

        .trainer-col-header {
            background: #ede9fe;
            color: #5b21b6;
            border-bottom-color: #c4b5fd;
        }

        .trainer-col-header.first-trainer-col,
        .trainer-cell.first-trainer-col {
            border-left: 2px solid #c4b5fd;
        }

        .trainer-cell {
            background: #faf5ff !important;
        }

        tbody tr:nth-child(even) .trainer-cell {
            background: #f5f3ff !important;
        }

        tbody tr:hover .trainer-cell {
            background: #ede9fe !important;
        }

        .trainer-assessment-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .trainer-assessment-section {
            display: grid;
            gap: 10px;
        }

        .trainer-block {
            border: 1px solid #d8b4fe;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px;
            min-width: 0;
        }

        .trainer-block-title {
            display: block;
            margin-bottom: 6px;
            font-size: 0.64rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6d28d9;
        }

        .checkbox-list {
            display: grid;
            gap: 6px;
        }

        .checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            font-size: 0.73rem;
            color: var(--primary);
            line-height: 1.35;
        }

        .checkbox-item input[type="checkbox"] {
            margin-top: 1px;
            accent-color: #7c3aed;
            flex: 0 0 auto;
        }

        .trainer-notes-block {
            border: 1px solid #d8b4fe;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.92);
            padding: 8px;
        }

        .trainer-notes-block textarea {
            min-height: 78px;
            resize: vertical;
            margin-top: 0;
        }

        .notes-textarea {
            min-height: 76px;
            resize: vertical;
            overflow-wrap: anywhere;
            white-space: pre-wrap;
        }

        /* Custom Tags Area */
        .custom-tags-area {
            margin-top: 8px;
            display: none; /* Hidden by default */
        }
        .custom-tags-area.show { display: block; }
        .added-tag {
            display: inline-flex;
            align-items: center;
            background: #f1f5f9;
            padding: 4px 8px;
            font-size: 0.7rem;
            margin-right: 4px;
            margin-bottom: 4px;
            border-radius: 2px;
            border: 1px solid var(--border);
        }
        .added-tag span { margin-left: 6px; cursor: pointer; font-weight: bold; color: var(--secondary); }
        .added-tag span:hover { color: #ef4444; }

        /* Level Buttons */
        .lvl-wrap { display: flex; gap: 6px; }
        .lvl-btn {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #fff;
            cursor: pointer;
            color: var(--secondary);
            text-transform: uppercase;
        }
        .lvl-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* Footer */
        .footer {
            padding: 1.5rem 2rem;
            background: #f8fafc;
            border-top: 2px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .sig-row {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .sig-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 140px;
        }
        .sig-item label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--secondary);
        }
        .sig-item input, .sig-item select, .sig-item textarea {
            font-size: 0.9rem;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: #fff;
            font-family: var(--font-main);
        }

        .sig-item textarea {
            min-height: 84px;
            resize: vertical;
        }

        .footer-main {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            flex: 1;
            margin-right: 1.5rem;
        }

        .footer-extra {
            display: grid;
            grid-template-columns: repeat(3, minmax(180px, 1fr));
            gap: 1rem;
        }

        .footer-extra .sig-item.full-width {
            grid-column: 1 / -1;
            min-width: 0;
        }

        .print-btn {
            background: #fff;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 24px;
            border-radius: 2px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-head);
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .print-btn:hover { background: var(--primary); color: #fff; }

        .btn-del {
            background: transparent; border: none; color: #cbd5e1; cursor: pointer;
            font-size: 1.5rem; transition: color 0.2s; line-height: 1;
        }
        .btn-del:hover { color: #ef4444; }

        /* Print Styles */
        @media print {
            @page {
                size: A4 landscape;
                margin: 8mm;
            }
            .toolbar, .col-del, .print-btn, .custom-input { display: none !important; }
            body { background: #fff; padding: 0; }
            .root { box-shadow: none; border: 2px solid #000; border-radius: 0; max-width: 100%; width: 100%; }
            .hdr, .footer { background: #fff !important; border-bottom: 2px solid #000; border-top: 2px solid #000; }
            .btn-add { display: none; }
            .table-wrap { overflow: visible; padding: 0; background: #fff; }
            table { table-layout: fixed; width: 100%; }
            th, td { border-bottom: 1px solid #ccc; border-right: 1px solid #ccc; color: #000; padding: 8px 6px; font-size: 9pt; }
            th { font-size: 8pt; }
            .tag-btn { border: 1px solid #000; color: #000; }
            .tag-btn.active { background: #000; color: #fff; }
            .tag-btn:not(.active), .tag-btn.custom-btn, .lvl-btn:not(.active) { display: none !important; }
            .tag-grid, .lvl-wrap {
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
            }
            .tag-btn.active, .lvl-btn.active, .added-tag {
                display: inline-flex !important;
                align-items: center;
                justify-content: center;
                width: auto;
                min-width: 0;
                padding: 3px 8px;
            }
            .field-section { border: 1px solid #ccc; background: #fff; padding: 6px; }
            .tag-grid { grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 4px; }
            .hdr { padding: 1rem 1.25rem; }
            .footer { padding: 1rem 1.25rem; }
            .footer-extra { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .sig-item textarea { min-height: 56px; }
            .custom-tags-area { display: block !important; }
            .added-tag span { display: none !important; }
            .trainer-assessment-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .trainer-block, .trainer-notes-block { background: #fff; }
        }

        @media (max-width: 980px) {
            .footer {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }
            .footer-main {
                margin-right: 0;
            }
            .footer-extra {
                grid-template-columns: 1fr;
            }
            .trainer-assessment-grid,
            .client-meta {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="root">
    <div class="hdr">
        <div class="brand">
            <img src="Photoroom_20251014_101748.PNG" alt="57 Physique Logo">
            <div class="brand-text">
                <h1></h1>
                <span></span>
            </div>
        </div>

        <div class="hdr-meta">
            <div class="hdr-field">
                <label for="classSelect"><span class="label-icon">🗂</span>Class Name</label>
                <select id="classSelect" onchange="updateTrainer()">
                    <option value="" disabled selected>Select class...</option>
                </select>
            </div>
            
            <div class="hdr-field">
                <label for="dateField"><span class="label-icon">🗓</span>Date</label>
                <input type="date" id="dateField">
            </div>

            <div class="hdr-field">
                <label for="trainerSelect"><span class="label-icon">🎤</span>Trainer</label>
                <select id="trainerSelect" disabled>
                    <option value="" disabled selected>Select a class first</option>
                </select>
            </div>
        </div>

        <div class="doc-title">
            <h2>Front Desk Copy</h2>
            <p>Confidential — Trainer Eyes Only</p>
        </div>
    </div>

    <div class="toolbar">
        <button class="btn-add" onclick="addRow()">
            <span class="btn-icon">✚</span> Add New Client
        </button>
        <span id="countLabel" style="font-size: 0.8rem; font-weight: 600; color: var(--secondary);">0 CLIENTS</span>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th style="width: 40px;">#</th>
                    <th style="min-width: 300px;">Client Details</th>
                    <th class="col-med">Medical Conditions</th>
                    <th class="col-inj">Injuries / Meds</th>
                    <th class="col-goals">Fitness Goals</th>
                    <th class="col-prev">Prev. Workout</th>
                    <th class="col-level">Level</th>
                    <th class="col-flags">Flags</th>
                    <th class="col-notes">Notes</th>
                    <th class="col-trainer-assessment trainer-col-header first-trainer-col">Trainer Assessment</th>
                    <th class="col-del"></th>
                </tr>
            </thead>
            <tbody id="tbody">
                <!-- Rows added via JS -->
            </tbody>
        </table>
    </div>

    <div class="footer">
        <div class="footer-main">
            <div class="sig-row">
                <div class="sig-item">
                    <label for="frontDeskSelect">Completed by (Front Desk)</label>
                    <select id="frontDeskSelect">
                        <option value="" disabled selected>Select staff...</option>
                    </select>
                </div>
                <div class="sig-item">
                    <label>Time</label>
                    <input type="time" id="timeField">
                </div>
                <div class="sig-item">
                    <label for="receivedBySelect">Received by (Trainer)</label>
                    <select id="receivedBySelect">
                        <option value="" disabled selected>Select...</option>
                    </select>
                </div>
            </div>
            <div class="footer-extra">
                <div class="sig-item">
                    <label for="membershipRecommended">Membership Recommended</label>
                    <select id="membershipRecommended">
                        <option value="" selected>Select...</option>
                        <option>Single Class</option>
                        <option>Intro Offer</option>
                        <option>Class Pack</option>                    
                        <option>Unlimited Membership</option>
                        <option>Trainer Follow-up Needed</option>
                        <option>None</option>
                    </select>
                </div>
                <div class="sig-item">
                    <label for="clientStatus">Status</label>
                    <select id="clientStatus">
                        <option value="" selected>Select...</option>
                        <option>Completed</option>
                        <option>Shared pricing</option>
                        <option>Needs Follow-up</option>
                        <option>High Priority</option>
                        <option>Medical Clearance Needed</option>
                        <option>Converted</option>
                    </select>
                </div>
                <div class="sig-item">
                    <label for="postClassOwner">Post-Class Owner</label>
                    <select id="postClassOwner">
                        <option value="" disabled selected>Select staff...</option>
                    </select>
                </div>
                <div class="sig-item full-width">
                    <label for="trainerComments">Post-Class Trainer Comments</label>
                    <textarea id="trainerComments" placeholder="Add trainer observations, modifications used, recommended next steps, and client follow-up notes..."></textarea>
                </div>
            </div>
        </div>
        <button class="print-btn" onclick="window.print()">🖨 Print Document</button>
    </div>
</div>

    const STATIC_CLASSES = [
        { id: 'barre-57-815', name: 'Barre 57 · 8:15 AM · Monday', trainer: '' },
        { id: 'power-cycle-600', name: 'Power Cycle · 6:00 PM · Monday', trainer: '' },
        { id: 'barre-57-815', name: 'Barre 57 · 8:15 AM · Tuesday', trainer: '' },
        { id: 'power-cycle-600', name: 'Power Cycle · 6:00 PM · Tuesday', trainer: '' },

        { id: 'power-cycle-600', name: 'Power Cycle · 6:00 PM · Wednesday', trainer: '' },
        { id: 'barre-57-815', name: 'Barre 57 · 8:15 AM · Thursday', trainer: '' },
        { id: 'power-cycle-600', name: 'Power Cycle · 6:00 PM · Thursday', trainer: '' },
        { id: 'barre-57-815', name: 'Barre 57 · 8:15 AM · Friday', trainer: '' },
        { id: 'power-cycle-600', name: 'Power Cycle · 6:00 PM · Friday', trainer: '' },
        { id: 'barre-57-900', name: 'Barre 57 · 9:00 AM · Saturday', trainer: '' },
        { id: 'power-cycle-1000', name: 'Power Cycle · 10:00 AM · Saturday', trainer: '' },
        { id: 'barre-57-900', name: 'Barre 57 · 9:00 AM · Sunday', trainer: '' },
        { id: 'power-cycle-1000', name: 'Power Cycle · 10:00 AM · Sunday', trainer: '' },
    ];

    // --- Initialization ---
    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateField').value = today;

        const now = new Date();
        const timeString = now.toTimeString().split(' ')[0].substring(0, 5);
        document.getElementById('timeField').value = timeString;

        populateStaffDropdowns();
        populateTrainerDropdowns();
        populateClasses(STATIC_CLASSES);
        addRow();
    });

    function populateStaffDropdowns() {
        populateSelect('frontDeskSelect', STAFF_OPTIONS, 'Select staff...');
        populateSelect('postClassOwner', STAFF_OPTIONS, 'Select staff...');
    }

    function populateSelect(selectId, options, placeholder) {
        const select = document.getElementById(selectId);
        if (!select) return;

        select.innerHTML = `<option value="" disabled selected>${placeholder}</option>`;
        options.forEach(name => {
            const option = document.createElement('option');
            option.value = name;
            option.textContent = name;
            select.appendChild(option);
        });
    }

    function populateTrainerDropdowns() {
        const trainerSelect = document.getElementById('trainerSelect');
        const receivedSelect = document.getElementById('receivedBySelect');

        trainerSelect.innerHTML = '<option value="" disabled selected>Select trainer...</option>';
        receivedSelect.innerHTML = '<option value="" disabled selected>Select...</option>';

        TRAINERS.forEach(name => {
            const trainerOption = document.createElement('option');
            trainerOption.value = name;
            trainerOption.textContent = name;
            trainerSelect.appendChild(trainerOption);

            const receivedOption = document.createElement('option');
            receivedOption.value = name;
            receivedOption.textContent = name;
            receivedSelect.appendChild(receivedOption);
        });

        trainerSelect.disabled = false;
    }

    function populateClasses(data) {
        const select = document.getElementById('classSelect');
        select.innerHTML = '<option value="" disabled selected>Select Class...</option>';

        data.forEach(session => {
            const option = document.createElement('option');
            option.value = session.id;
            option.dataset.trainer = session.trainer || '';
            option.textContent = session.name;
            select.appendChild(option);
        });
    }

    function updateTrainer() {
        const classSelect = document.getElementById('classSelect');
        const trainerSelect = document.getElementById('trainerSelect');
        const selectedOption = classSelect.options[classSelect.selectedIndex];

        if (selectedOption && selectedOption.dataset.trainer) {
            trainerSelect.value = selectedOption.dataset.trainer;
        } else {
            trainerSelect.selectedIndex = 0;
        }
    }

    // --- Table Logic ---
    let rowCount = 0;

    function addRow() {
        rowCount++;
        const tbody = document.getElementById('tbody');
        const row = document.createElement('tr');
        
        row.innerHTML = `
            <td>${rowCount}</td>
            <td>
                <div class="client-details">
                    <input type="text" class="name-input" placeholder="Full Name">
                    <div class="client-meta">
                        <div class="client-meta-field">
                            <label for="gender-${rowCount}">Gender</label>
                            ${createSelect(`gender-${rowCount}`, 'Select gender...', GENDER_OPTIONS)}
                        </div>
                        <div class="client-meta-field">
                            <label for="age-range-${rowCount}">Age Range</label>
                            ${createSelect(`age-range-${rowCount}`, 'Select age range...', AGE_RANGE_OPTIONS)}
                        </div>
                    </div>
                </div>
            </td>
            
            <!-- Medical -->
            <td>
                <div class="field-sections">
                    <div class="field-section">
                        <span class="field-section-title">Body Part</span>
                        <div class="tag-grid" id="med-body-grid-${rowCount}">
                            ${createTags(['Neck', 'Back', 'Shoulder', 'Elbow', 'Hip', 'Knee', 'Ankle', 'Other'])}
                        </div>
                        <div class="custom-tags-area" id="med-body-custom-${rowCount}"></div>
                        <button class="tag-btn custom-btn" style="margin-top:6px; width:100%" onclick="toggleCustomInput(this, 'med-body-${rowCount}')">+ Add Body Part</button>
                    </div>
                    <div class="field-section">
                        <span class="field-section-title">Condition / Injury Type</span>
                        <div class="tag-grid" id="med-type-grid-${rowCount}">
                            ${createTags(['Pain', 'Tightness', 'Sprain', 'Strain', 'Surgery', 'Chronic', 'Inflammation', 'Medication'])}
                        </div>
                        <div class="custom-tags-area" id="med-type-custom-${rowCount}"></div>
                        <button class="tag-btn custom-btn" style="margin-top:6px; width:100%" onclick="toggleCustomInput(this, 'med-type-${rowCount}')">+ Add Condition Type</button>
                    </div>
                </div>
            </td>

            <!-- Injuries -->
            <td>
                <div class="tag-grid" id="inj-grid-${rowCount}">
                    ${createTags(['Knee Issue', 'Surgery', 'Sprain', 'Fracture', 'Chronic Pain', 'Meds'])}
                </div>
                <div class="custom-tags-area" id="inj-custom-${rowCount}"></div>
                <button class="tag-btn custom-btn" style="margin-top:6px; width:100%" onclick="toggleCustomInput(this, 'inj-${rowCount}')">+ Add Custom</button>
            </td>

            <!-- Goals -->
            <td>
                <div class="tag-grid" id="goal-grid-${rowCount}">
                    ${createTags(['Weight Loss', 'Muscle Tone', 'Strength', 'Flexibility', 'Posture', 'Cardio', 'Rehab'])}
                </div>
                <div class="custom-tags-area" id="goal-custom-${rowCount}"></div>
                <button class="tag-btn custom-btn" style="margin-top:6px; width:100%" onclick="toggleCustomInput(this, 'goal-${rowCount}')">+ Add Custom</button>
            </td>

             <!-- Prev Workout -->
             <td>
                <div class="tag-grid" id="prev-grid-${rowCount}">
                    ${createTags(['Gym', 'Yoga', 'Pilates', 'CrossFit', 'Running', 'Swimming', 'None'])}
                </div>
                <div class="custom-tags-area" id="prev-custom-${rowCount}"></div>
                <button class="tag-btn custom-btn" style="margin-top:6px; width:100%" onclick="toggleCustomInput(this, 'prev-${rowCount}')">+ Add Custom</button>
            </td>

            <!-- Level -->
            <td>
                <div class="lvl-wrap">
                    <button class="lvl-btn" onclick="setLvl(this)">Beg</button>
                    <button class="lvl-btn" onclick="setLvl(this)">Int</button>
                    <button class="lvl-btn" onclick="setLvl(this)">Adv</button>
                </div>
            </td>

            <!-- Flags -->
            <td>
                <div class="tag-grid" id="flag-grid-${rowCount}">
                    ${createTags(['Modify', 'Doctor Note', 'High-touch', 'No Exertion', 'Slow Pace', 'Senior'])}
                </div>
                <div class="custom-tags-area" id="flag-custom-${rowCount}"></div>
                <button class="tag-btn custom-btn" style="margin-top:6px; width:100%" onclick="toggleCustomInput(this, 'flag-${rowCount}')">+ Add Custom</button>
            </td>

            <!-- Notes -->
            <td>
                <textarea class="notes-textarea" placeholder="Quick notes..." style="margin-top:0"></textarea>
            </td>

            <!-- Trainer Assessment -->
            <td class="trainer-cell first-trainer-col">
                <div class="trainer-assessment-section">
                    <div class="trainer-assessment-grid">
                        <div class="trainer-block">
                            <span class="trainer-block-title">Form / Technique</span>
                            ${createCheckboxGroup(`form-${rowCount}`, FORM_OPTIONS)}
                        </div>
                        <div class="trainer-block">
                            <span class="trainer-block-title">Recommended Program</span>
                            ${createCheckboxGroup(`program-${rowCount}`, RECOMMENDED_PROGRAM_OPTIONS)}
                        </div>
                        <div class="trainer-block">
                            <span class="trainer-block-title">Trainer Follow-up</span>
                            ${createCheckboxGroup(`followup-${rowCount}`, FOLLOW_UP_OPTIONS)}
                        </div>
                    </div>
                    <div class="trainer-notes-block">
                        <span class="trainer-block-title">Trainer Notes</span>
                        <textarea></textarea>
                    </div>
                </div>
            </td>

            <td class="col-del">
                <button class="btn-del" onclick="removeRow(this)" title="Remove Row">🗑</button>
            </td>
        `;
        
        tbody.appendChild(row);
        updateCount();
    }

    function createTags(labels) {
        return labels.map(label => 
            `<button class="tag-btn" onclick="toggleTag(this)">${label}</button>`
        ).join('');
    }

    function createSelect(id, placeholder, options, className = '') {
        return `
            <select id="${id}" class="${className}">
                <option value="" disabled selected>${placeholder}</option>
                ${options.map(option => `<option>${option}</option>`).join('')}
            </select>
        `;
    }

    function createCheckboxGroup(name, options) {
        return `
            <div class="checkbox-list">
                ${options.map((option, index) => `
                    <label class="checkbox-item" for="${name}-${index}">
                        <input type="checkbox" id="${name}-${index}" name="${name}" value="${option}">
                        <span>${option}</span>
                    </label>
                `).join('')}
            </div>
        `;
    }

    function toggleTag(btn) {
        btn.classList.toggle('active');
    }

    function setLvl(btn) {
        const wrapper = btn.closest('.lvl-wrap');
        const buttons = wrapper.querySelectorAll('.lvl-btn');
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function removeRow(btn) {
        btn.closest('tr').remove();
        reNumberRows();
        updateCount();
    }

    function reNumberRows() {
        const rows = document.querySelectorAll('#tbody tr');
        rows.forEach((row, index) => {
            row.cells[0].textContent = index + 1;
        });
        rowCount = rows.length;
    }

    function updateCount() {
        const count = document.querySelectorAll('#tbody tr').length;
        const label = document.getElementById('countLabel');
        label.textContent = `${count} CLIENT${count !== 1 ? 'S' : ''}`;
    }

    // --- Custom Input Logic ---
    function toggleCustomInput(btn, prefix) {
        const row = btn.closest('tr');
        const container = row.querySelector(`#${prefix}-custom`) || row.querySelector(`#${prefix.replace(/-(\d+)$/, '-custom-$1')}`);
        if (!container) return;
        const input = container.querySelector('.custom-input');

        if (container.style.display === 'block') {
            container.style.display = 'none';
            btn.textContent = '+ Add Custom';
        } else {
            container.style.display = 'block';
            btn.textContent = 'Cancel';
            if(!input) {
                const newInput = document.createElement('input');
                newInput.className = 'custom-input';
                newInput.placeholder = 'Type & press Enter';
                newInput.onkeypress = function(e) {
                    if (e.key === 'Enter') {
                        addCustomTag(this.value, container);
                        this.value = '';
                    }
                };
                container.appendChild(newInput);
                setTimeout(() => newInput.focus(), 100);
            } else {
                input.focus();
            }
        }
    }

    function addCustomTag(text, container) {
        if(!text.trim()) return;
        
        const tag = document.createElement('div');
        tag.className = 'added-tag';
        tag.innerHTML = `${text} <span onclick="this.parentElement.remove()">×</span>`;
        
        // Insert before input
        const input = container.querySelector('input');
        container.insertBefore(tag, input);
    }
</script>
